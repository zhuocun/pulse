name: Deploy Backend (Fly.io)

# Supports both manual deploys from the Actions tab and push-on-merge
# deploys for backend changes on `main`.
#
# Repository operators still need to add `FLY_API_TOKEN` under
# Settings → Secrets and variables → Actions. Without the secret,
# the workflow fails fast at the `flyctl deploy` step rather than
# producing a half-deployed app.

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - ".github/workflows/deploy-backend.yml"

concurrency:
    group: deploy-backend
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: superfly/flyctl-actions/setup-flyctl@master
            - run: flyctl deploy --remote-only
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
