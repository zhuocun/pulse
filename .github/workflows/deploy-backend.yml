name: Deploy Backend (Fly.io)

# Default trigger is manual via the Actions tab so this workflow stays
# inert until the operator opts in. To enable push-on-merge deploys:
#
#   1. Add `FLY_API_TOKEN` to repository secrets
#      (Settings → Secrets and variables → Actions).
#   2. Uncomment the `push` block below.
#
# Without `FLY_API_TOKEN` the manual run still fails fast at the
# `flyctl deploy` step rather than producing a half-deployed app.

on:
    workflow_dispatch:
    # push:
    #     branches:
    #         - main
    #     paths:
    #         - "backend/**"
    #         - ".github/workflows/deploy-backend.yml"

concurrency:
    group: deploy-backend
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: superfly/flyctl-actions/setup-flyctl@master
            - run: flyctl deploy --remote-only
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
