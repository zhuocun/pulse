name: Backend CI

on:
    push:
        branches:
            - main
            - "claude/**"
        paths:
            - "backend/**"
            - ".github/workflows/backend-ci.yml"
    pull_request:
        branches:
            - main
            - "claude/**"
        paths:
            - "backend/**"
            - ".github/workflows/backend-ci.yml"
    workflow_dispatch:
        inputs:
            mode:
                description: "Jobs to run; target branch is selected in Run workflow. test-full = ruff + pytest with .[dev,ai]; test-slim = requirements.txt + import app.main."
                type: choice
                default: both
                options:
                    - both
                    - test-full
                    - test-slim

concurrency:
    group: backend-ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && format('dispatch-{0}', github.run_id) || 'push-pr' }}
    cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
    run:
        working-directory: backend

jobs:
    test-full:
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'both' || github.event.inputs.mode == 'test-full'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - run: pip install -e ".[dev,ai]"
            - run: ruff check .
            - run: pytest

    test-slim:
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'both' || github.event.inputs.mode == 'test-slim'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - run: pip install -r requirements.txt
            - run: python -c "import app.main"
